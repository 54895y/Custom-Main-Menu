name: Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CMM
        uses: actions/checkout@v4

      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Checkout japng
        uses: actions/checkout@v4
        with:
          repository: aellerton/japng
          path: japng-src

      - name: Build japng
        run: |
          cd japng-src
          chmod +x ./gradlew
          ./gradlew :api:jar --no-daemon
          mkdir -p "$GITHUB_WORKSPACE/libs"
          cp api/build/libs/*.jar "$GITHUB_WORKSPACE/libs/"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build CMM
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: CustomMainMenu-jar
          path: build/libs/*.jar
          if-no-files-found: error
